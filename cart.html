<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Oyebade Ayomide">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="twinz.css">
    <script src="twinz.js" defer></script>
    <title>Your Cart - Twinzlove_products</title>
</head>
<body>
    <header>
         <a href="index.html"><img id="first-image" src="Images/twinzloveproducts.jpeg" alt="home"></a>
        
        <div id="former">        
            <form action="#" method="get" id="searchbar">
                <input type="search" name="search" id="search" placeholder="search">
                <button type="submit" id="butt">
                    <img id="mag" src="Images/magnifying-glass-icon-isolated-on-white-background-search-illustration-vector.jpg" alt="search">
                </button> 
            </form>
            <a id="login" href="login.html">Login</a>
        </div>

        <div class="header-right">
            <a href="cart.html" class="cart-link">
                <span class="cart-icon-wrap">
                    <img id="cart" src="Images/cart.svg" alt="Cart">
                    <span id="cart-badge" class="cart-badge">0</span>
                </span>
            </a>

            <button type="button" class="menu-toggle" id="menuToggle" aria-label="Toggle menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <main class="cart-main">
        <h2>Your Shopping Cart</h2>
        <div id="cart-items-container">
            <!-- Dynamic items will be injected here by JS -->
        </div>
        <div id="cart-summary">
            <!-- Order summary and checkout action button will be injected here -->
        </div>
    </main>

    <footer>
        <address>
            CONTACT US <br />
            <img id="fool" src="Images/download.png" alt=""> +2348162487439 <br />
            <img src="Images/pin-location-icon-vector-iconic-design-symbol-transparency-grid-94181514.jpg" alt="" height="20px"> Prince house, Sokelu, Royal Estate, Ago area, Olunde, Ibadan. <br />
            <img src="Images/accepted.png" alt="" height="50px">
        </address>
        <div id="sign">
            <p>SIGN UP FOR DISCOUNTS AND UPDATES</p>
            <form action="#" method="post">
                <input type="text" name="sub" id="sub" placeholder="Enter your email address or phone number"> <br />
                <input type="submit" name="sub" id="submit" value="Subscribe">
            </form>
        </div>
    </footer>
</body>
</html>
